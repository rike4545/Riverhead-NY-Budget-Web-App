name: Parse Financial Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write
  actions: write

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Fetch new Town Board meeting minutes (CivicClerk)
        run: python etl/fetch_meetings.py

      - name: Parse financial reports
        run: python etl/parse_financial_reports.py

      - name: Parse account-level sub-account detail
        run: python etl/parse_subaccounts.py

      - name: Build multi-year fund appropriations history
        run: python etl/parse_budget_history.py

      - name: Build long-run General Fund history
        run: python etl/parse_general_fund.py

      - name: Parse Annual Financial Report actuals
        run: python etl/parse_afr.py

      - name: Parse Town Board meeting votes
        run: python etl/parse_meetings.py

      - name: Parse 2025 authorized salary schedule
        run: python etl/parse_salary_schedule.py

      - name: Build 2025 to 2026 salary raise comparison
        run: python etl/parse_salary_2026.py

      # Payroll must be rebuilt BEFORE the search index and CSV export, which
      # both read the payroll dataset.
      - name: Rebuild payroll dataset from slim sources
        run: python etl/parse_payroll.py

      - name: Build unified search index
        run: python etl/build_search_index.py

      - name: Export CSV downloads
        run: python etl/export_csv.py

      - name: Stamp data freshness metadata
        run: python etl/write_meta.py

      - name: Upload parsed data artifact
        uses: actions/upload-artifact@v7
        with:
          name: parsed-financial-reports
          path: web/public/data/financial-reports

      - name: Commit regenerated datasets
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add etl/data/meetings web/public/data web/public/downloads || true

          if git diff --cached --quiet; then
            echo "No parsed-data changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Auto-update parsed financial datasets"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with GITHUB_TOKEN do not trigger other workflows, so the
      # site would stay stale until the next manual push. Dispatch the deploy
      # explicitly whenever data changed.
      - name: Redeploy the site with fresh data
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main --repo "$GITHUB_REPOSITORY"
