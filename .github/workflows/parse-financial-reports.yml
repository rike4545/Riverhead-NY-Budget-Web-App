name: Parse Financial Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Parse financial reports
        run: python etl/parse_financial_reports.py

      - name: Parse account-level sub-account detail
        run: python etl/parse_subaccounts.py

      - name: Build multi-year fund appropriations history
        run: python etl/parse_budget_history.py

      - name: Build long-run General Fund history
        run: python etl/parse_general_fund.py

      - name: Parse Annual Financial Report actuals
        run: python etl/parse_afr.py

      - name: Parse Town Board meeting votes
        run: python etl/parse_meetings.py

      - name: Parse 2025 authorized salary schedule
        run: python etl/parse_salary_schedule.py

      - name: Build 2025 to 2026 salary raise comparison
        run: python etl/parse_salary_2026.py

      - name: Build unified search index
        run: python etl/build_search_index.py

      - name: Export CSV downloads
        run: python etl/export_csv.py

      - name: Rebuild payroll dataset from slim sources
        run: python etl/parse_payroll.py

      - name: Upload parsed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: parsed-financial-reports
          path: web/public/data/financial-reports

      - name: Commit regenerated datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add web/public/data/financial-reports web/public/data/subaccounts web/public/data/history web/public/data/payroll web/public/data/afr web/public/data/meetings web/public/data/salary web/public/data/search web/public/downloads || true

          if git diff --cached --quiet; then
            echo "No parsed-data changes detected."
            exit 0
          fi

          git commit -m "Auto-update parsed financial datasets"
          git push
