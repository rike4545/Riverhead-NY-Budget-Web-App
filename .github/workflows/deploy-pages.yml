name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf "cryptography>=3.1"

      - name: Parse all financial-report PDFs safely
        run: python etl/run_ingestion_safe.py

      - name: Parse Peconic Bay CPF financial statements
        run: python etl/parse_cpf.py

      - name: Commit parsed financial-report data
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/financial-reports web/public/data/cpf || true
          if git diff --cached --quiet; then
            echo "No parsed financial-report data changes."
          else
            git commit -m "Update parsed Riverhead financial-report data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: web
        run: |
          npm run build
          touch out/.nojekyll
          npm run verify

      - name: Trim heavyweight parser outputs from the Pages artifact
        working-directory: web
        # These raw parser files (~175MB) are ETL inputs kept in the repo, but
        # nothing on the site fetches them at runtime — search uses the compact
        # data/search/unified.json instead. Removing them cuts the deploy
        # artifact by ~95%.
        run: |
          rm -rf out/data/financial-reports/documents
          rm -f out/data/financial-reports/line-item-candidates.json
          rm -f out/data/financial-reports/search-index.json
          rm -f out/data/financial-reports/citations.json
          du -sh out

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      # The Pages service occasionally returns a transient
      # "Deployment failed, try again later." — one automatic retry after a
      # short pause absorbs it instead of failing the whole run.
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy (transient Pages failures)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5
